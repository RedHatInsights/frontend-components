name: Frontend components CI pipeline
permissions:
  contents: read
on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  install:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: './.github/actions/setup-environment'
      - uses: './.github/actions/cypress-cache'
      - name: Install dependencies
        run: npm ci
  build:
    runs-on: ubuntu-24.04
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: './.github/actions/setup-environment'
      - uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4
      - name: Build
        run: npm run build
  unit-test:
    runs-on: ubuntu-24.04
    needs: [install]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: './.github/actions/setup-environment'
      - uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4
      - name: Run unit tests
        run: npm run test:unit
  component-test:
    runs-on: ubuntu-24.04
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: './.github/actions/setup-environment'
      - uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4
      - uses: './.github/actions/cypress-cache'
      - name: Install deps
        shell: bash
        run: npm ci
      - name: Run component tests
        uses: cypress-io/github-action@be1bab96b388bbd9ce3887e397d373c8557e15af # v6.9.2
        with:
          command: npx nx affected -t test:component --exclude=demo --outputStyle=static --parallel=1
  lint:
    runs-on: ubuntu-24.04
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: './.github/actions/setup-environment'
      - uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4
      - name: Lint
        run: npx nx affected -t lint --exclude=demo --outputStyle=static
  commitlint:
    needs: [install]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: './.github/actions/setup-environment'
      - name: install
        shell: bash
        run: npm ci
      - name: Validate current commit on push
        shell: bash
        if: github.event_name == 'push'
        run: npx commitlint --last --verbose
      - name: Validate PR commits
        shell: bash
        if: github.event_name == 'pull_request'
        run: npx commitlint --from ${{ github.event.pull_request.head.sha }}~${{ github.event.pull_request.commits }} --to ${{ github.event.pull_request.head.sha }} --verbose
  check-circular-imports:
    runs-on: ubuntu-24.04
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: './.github/actions/setup-environment'
      - uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4
      - name: install
        shell: bash
        run: npm ci
      - name: Check circular imports
        run: npx nx affected -t test:circular-dependencies --exclude=demo --outputStyle=static
  release:
    runs-on: ubuntu-24.04
    needs: [install, build, unit-test, component-test, lint, commitlint, check-circular-imports]
    # Only run on push to master branch (never on PRs, workflow_dispatch, etc.)
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment: npm-publish
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_BOT_TOKEN }}
      - uses: './.github/actions/release'
        with:
          gh_token: ${{ secrets.GH_BOT_TOKEN }}
          gh_name: ${{ secrets.BOT_NAME }}
          gh_email: ${{ secrets.BOT_EMAIL }}
