name: Chromatic Upload

on:
  workflow_run:
    workflows: ["Frontend components CI pipeline"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  upload:
    runs-on: ubuntu-24.04
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.event == 'pull_request' || github.event.workflow_run.event == 'push')
    steps:
      - name: Checkout Base Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Download Artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        id: download
        with:
          name: storybook-static
          path: storybook-static
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Retry Download Artifact
        if: steps.download.outcome == 'failure'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: storybook-static
          path: storybook-static
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Chromatic
        id: chromatic
        uses: chromaui/action@a01e849cbc1f51ec5743358b4d7f9a1eadadf44e # v1
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          storybookBuildDir: storybook-static
          autoAcceptChanges: ${{ github.event.workflow_run.event == 'push' }}

      - name: Find PR number
        id: find-pr
        if: github.event.workflow_run.event == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const prs = context.payload.workflow_run.pull_requests;
            if (prs && prs.length > 0) {
              return prs[0].number;
            }
            return null;

      - name: Find existing comment
        id: find-comment
        if: steps.find-pr.outputs.result && steps.find-pr.outputs.result != 'null'
        uses: peter-evans/find-comment@3eae4d37986fb5a8592848f6a574fdf654e61f9e # v3
        with:
          issue-number: ${{ steps.find-pr.outputs.result }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- chromatic-build -->'

      - name: Comment on PR
        if: steps.find-pr.outputs.result && steps.find-pr.outputs.result != 'null'
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ steps.find-pr.outputs.result }}
          edit-mode: replace
          body: |
            <!-- chromatic-build -->
            ### Chromatic Build

            | | Link |
            |---|---|
            | Storybook | ${{ steps.chromatic.outputs.storybookUrl }} |
            | Build | ${{ steps.chromatic.outputs.buildUrl }} |
