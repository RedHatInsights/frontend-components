name: Release job
description: build affected packages and publish them to npm
inputs:
  gh_token:
    description: 'Github token'
    required: true
  gh_name:
    description: 'Github name'
    required: true
  gh_email:
    description: 'Github email'
    required: true
runs:
  using: "composite"
  steps:
    - uses: './.github/actions/setup-environment'
    - name: Upgrade npm for OIDC trusted publishing
      shell: bash
      run: npm install -g npm@latest
    - name: Install deps
      shell: bash
      run: npm i
    - name: git config
      shell: bash
      run: |
        git config user.name "${{ inputs.gh_name }}"
        git config user.email "${{ inputs.gh_email }}"
    - name: Remove _authToken so npm uses OIDC for trusted publishing
      shell: bash
      run: npm config delete //registry.npmjs.org/:_authToken
    - name: Release
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        GITHUB_TOKEN: ${{ inputs.gh_token }}
        # Disable legacy peer deps to ensure proper dependency resolution
        # See: https://github.com/nrwl/nx/issues/22066#issuecomment-2576366862
        # See: https://github.com/nrwl/nx/blob/5ea2e47acfa9d175546daa922ce40905533f1074/packages/nx/src/utils/package-manager.ts#L207-L213
        npm_config_legacy_peer_deps: false
      run: npx nx release --yes
    - name: Push release commit and tags
      shell: bash
      # nx release (unified command) creates the git commit and tags locally but does not push them,
      # regardless of the release.git.push setting in nx.json. It only pushes automatically when
      # createRelease (GitHub/GitLab releases) is enabled. Since we use createReleaseInGitHub: false,
      # we push manually here so that the version bumps in package.json reach the remote and
      # nacho-bot can create PRs in consuming repos.
      # HUSKY=0 disables pre-push hooks in CI — tests are run separately by the CI pipeline.
      env:
        HUSKY: '0'
      run: git push --follow-tags
  
